[package]
name = "claude-profile"
version = "0.1.0"
edition = "2021"
description = "Launch claude with only the plugins, skills, and MCP servers a profile defines"
license = "MIT"

[[bin]]
name = "claude-profile"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
anyhow = "1"
tempfile = "3"

[profile.dist]
inherits = "release"
lto = "thin"

[workspace.metadata.dist]
cargo-dist-version = "0.28.0"
ci = ["github"]
installers = ["shell", "powershell", "homebrew"]
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
# NOTE: config authored by hand; NOT generated by `cargo dist init` (cargo-dist
# is not installable in the authoring environment). Validate/regenerate on the
# first release with `dist init` before tagging.
