# Authored by hand from cargo-dist's standard workflow shape; regenerate with `dist generate` on first release. Not executed in the authoring environment.
name: Release
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
permissions:
  contents: write
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/latest/download/cargo-dist-installer.sh | sh
      - name: Plan
        run: dist plan --output-format=json > dist-plan.json
      - uses: actions/upload-artifact@v4
        with: { name: plan, path: dist-plan.json }
  build:
    needs: plan
    strategy:
      matrix:
        include:
          - { os: macos-14,    target: aarch64-apple-darwin }
          - { os: macos-13,    target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/latest/download/cargo-dist-installer.sh | sh
      - name: Build artifacts
        run: dist build --target ${{ matrix.target }} --output-format=json
      - uses: actions/upload-artifact@v4
        with: { name: "artifacts-${{ matrix.target }}", path: "target/distrib/*" }
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts-*/**
          fail_on_unmatched_files: false
